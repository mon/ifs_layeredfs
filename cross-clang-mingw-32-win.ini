# for building on Windows, runs binaries natively instead of the Linux one that uses wine

[binaries]
c = 'i686-w64-mingw32-clang'
cpp = 'i686-w64-mingw32-clang++'
ar = 'i686-w64-mingw32-ar'
windres = 'i686-w64-mingw32-windres'
strip = 'i686-w64-mingw32-strip'

[properties]
needs_exe_wrapper = false

[host_machine]
system = 'windows'
cpu_family = 'x86'
cpu = 'x86'
endian = 'little'
